<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cannonball</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #7dcdc2;
      }
      canvas {
        display: block;
      }
      /* Boot loading screen — shown INSTANTLY (it's in the HTML, needs no JS) so
         the initial blank teal never shows game UI. main.ts removes #boot once
         the game is running. A gentle pulse tells the user it's alive. */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #7dcdc2;
        color: #4a443c;
        font: 800 30px system-ui, sans-serif;
        letter-spacing: 2px;
        animation: bootpulse 1.1s ease-in-out infinite;
      }
      @keyframes bootpulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot">LOADING…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
